<body>
  <header>
    <div class="nav container">
      <a class="brand" href="index.html#top" aria-label="Anass Mahmoudi">
        <span class="brand-mark">AM</span>
        <span class="brand-name">Anass Mahmoudi</span>
      </a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span>
      </button>
      <nav aria-label="Primary" id="primaryNav">
        <ul>
          <li><a href="index.html#work">Work</a></li>
          <li><a href="index.html#about">About</a></li>
          <li><a href="blogs.html">Writing</a></li>
          <li><a href="index.html#contact" class="nav-cta">Contact <span aria-hidden="true">↗</span></a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <header class="page-head">
      <span class="eyebrow"><span class="eyebrow-num">—</span> Writing</span>
      <h1 class="page-title">Notes on <em>building software</em>.</h1>
      <p class="page-lede">Occasional essays on Laravel, Flutter, product craft and the messy reality of shipping side projects.</p>
    </header>

    <div id="postsGrid" class="post-list" aria-live="polite"></div>
  </main>

  <script>
    function escapeHtml(str){ return String(str||'').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s])); }
    async function loadPosts(){
      const grid = document.getElementById('postsGrid');
      try{
        const res = await fetch('posts.json');
        const posts = await res.json();
        posts.sort((a,b)=> new Date(b.date) - new Date(a.date));
        if(!posts.length){ grid.innerHTML = '<p class="empty">No posts yet.</p>'; return; }
        posts.forEach(p => {
          const a = document.createElement('a');
          a.className = 'post-row';
          a.href = `blog-post.html?id=${encodeURIComponent(p.id)}`;
          a.innerHTML = `
            <span class="post-date">${escapeHtml(p.date)}</span>
            <div class="post-info">
              <h2 class="post-title">${escapeHtml(p.title)}</h2>
              <p class="post-excerpt">${escapeHtml(p.excerpt)}</p>
            </div>
            <span class="post-arrow" aria-hidden="true">↗</span>`;
          grid.appendChild(a);
        });
      }catch(err){ console.error('Failed to load posts', err); grid.innerHTML = '<p class="empty">Couldn\'t load posts.</p>'; }
    }
    loadPosts();
  </script>
  <script src="/functionality.js"></script>
</body>
</html>
